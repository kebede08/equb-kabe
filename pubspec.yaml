name: equb
description: Equb Mobile Application - Digital Ethiopian Rotating Savings System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # HTTP & API
  dio: ^5.4.1
  retrofit: ^4.1.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  pin_code_fields: ^8.0.1
  image_picker: ^1.0.7
  intl: ^0.19.0
  timeago: ^3.6.1

  # Notifications
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19
  flutter_local_notifications: ^17.0.0

  # PDF & Export
  pdf: ^3.10.8
  printing: ^5.12.0
  excel: ^4.0.2

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1

  # Utils
  uuid: ^4.3.3
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.0.2+1
  connectivity_plus: ^6.0.3
  local_auth: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  retrofit_generator: ^8.1.0
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
